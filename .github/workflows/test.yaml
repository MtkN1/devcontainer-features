name: "CI - Test Features"
on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

jobs:
  set-matrix:
    runs-on: ubuntu-latest
    outputs:
      features: ${{ steps.set-features.outputs.features }}
    steps:
      - uses: actions/checkout@v6

      - id: set-features
        name: "Collect feature directories under src"
        shell: bash
        run: |
          features_json=$(find src -mindepth 1 -maxdepth 1 -type d | sort | while read -r feature_dir; do
            if [ -f "$feature_dir/devcontainer-feature.json" ]; then
              basename "$feature_dir"
            fi
          done | jq -R . | jq -s .)

          echo "features=$features_json" >> "$GITHUB_OUTPUT"

  test-autogenerated:
    runs-on: ubuntu-latest
    continue-on-error: true
    needs: set-matrix
    strategy:
      matrix:
        features: ${{ fromJson(needs.set-matrix.outputs.features) }}
        baseImage:
          - mcr.microsoft.com/devcontainers/base:trixie
          - mcr.microsoft.com/devcontainers/base:noble
    steps:
      - uses: actions/checkout@v6

      - name: "Install latest devcontainer CLI"
        run: npm install -g @devcontainers/cli

      - name: "Generating tests for '${{ matrix.features }}' against '${{ matrix.baseImage }}'"
        run: devcontainer features test --skip-scenarios -f ${{ matrix.features }} -i ${{ matrix.baseImage }} .
